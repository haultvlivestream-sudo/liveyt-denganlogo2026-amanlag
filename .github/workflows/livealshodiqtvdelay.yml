name: Live Bantu AlShodiq tv Delay 

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link Video Sumber'
        required: true
      kunci_rtmp:
        description: 'Stream Key YouTube'
        required: true
      durasi_live:
        description: 'Durasi Live (Format: HH:MM:SS)'
        required: true
        default: '02:43:00'

jobs:
  streaming:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fix Node.js Path
        run: echo "$(dirname $(which node))" >> $GITHUB_PATH

      - name: 3. Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl
          # Download yt-dlp terbaru (tanpa melakukan update -U agar tidak terkena rate limit)
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 4. Jalankan Relay Streaming
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          set +e
          echo "$YT_COOKIES" > cookies.txt
          
          LOGO_FILE="logoalshodiqtv.mp4"
          if [ ! -f "$LOGO_FILE" ]; then
            echo "ERROR: File $LOGO_FILE tidak ditemukan!"
            exit 1
          fi

          while true; do
            echo "--- [$(date)] Memulai Relay dengan durasi: ${{ github.event.inputs.durasi_live }} ---"
            
            VIDEO_URL=$(yt-dlp --cookies cookies.txt \
                               --js-runtime node \
                               --force-ipv4 \
                               -f "best[ext=mp4]/best" \
                               -g "${{ github.event.inputs.link_youtube }}" 2>/dev/null)

            if [ -z "$VIDEO_URL" ]; then
              echo "Gagal ambil URL. Mencoba lagi dalam 5 detik..."
              sleep 5
              continue
            fi

            echo "SUMBER DITEMUKAN! Memulai FFmpeg Relay..."

            # Menggunakan ffmpeg dengan fitur reconnect dan limit waktu (durasi_live)
            ffmpeg -re -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
              -i "$VIDEO_URL" \
              -stream_loop -1 -i "$LOGO_FILE" \
              -filter_complex \
              "[1:v]colorkey=0x007200:0.1:0.1,scale=iw*0.15:-1[logo]; \
               [0:v][logo]overlay=W-w-(W*0.03):(W*0.03):shortest=1" \
              -c:v libx264 -preset ultrafast -b:v 8000k -maxrate 10000k -bufsize 20000k \
              -pix_fmt yuv420p -g 60 -keyint_min 60 -sc_threshold 0 \
              -c:a aac -ar 44100 -b:a 128k \
              -t ${{ github.event.inputs.durasi_live }} \
              -f flv "rtmp://a.rtmp.youtube.com/live2/${{ github.event.inputs.kunci_rtmp }}"

            # Jika FFmpeg berhenti karena durasi tercapai, exit code adalah 0
            if [ $? -eq 0 ]; then
              echo "Streaming selesai sesuai durasi yang diatur."
              break
            fi

            echo "Stream terputus. Mencoba reconnect dalam 5 detik..."
            sleep 5
          done
          
