name: Downloader Video SUPER HD + Tempel Logo (Anti-403 Fix)

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link Video Sumber'
        required: true
      mulai:
        description: 'Mulai (Jam:Menit:Detik)'
        default: '00:00:10'
      selesai:
        description: 'Selesai (Jam:Menit:Detik)'
        default: '00:00:40'

jobs:
  proses_editing:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Tools (Engine Terkuat)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl bc
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp -U

      - name: 4. Eksekusi Download & Pemrosesan Lokal
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          echo "$YT_COOKIES" > cookies.txt
          
          # Memastikan file logo ada
          LOGO_FILE="logoihya2026.mp4"
          if [ ! -f "$LOGO_FILE" ]; then
            echo "ERROR: File $LOGO_FILE tidak ditemukan di repository!"
            ls
            exit 1
          fi
          
          echo "--- [Langkah 1: Mengunduh Video Kualitas 1080p Secara Utuh] ---"
          # yt-dlp mengunduh file fisik terlebih dahulu agar terhindar dari pemutusan koneksi di tengah jalan
          yt-dlp --cookies cookies.txt \
                 --js-runtime node \
                 --force-ipv4 \
                 --no-playlist \
                 --extractor-args "youtube:player_client=web,android" \
                 -f "bestvideo[height<=1080]+bestaudio/best[height<=1080]" \
                 --merge-output-format mp4 \
                 -o "video_sumber_asli.mp4" \
                 "${{ github.event.inputs.link_youtube }}"

          # Validasi apakah file mentah berhasil terunduh
          if [ ! -f "video_sumber_asli.mp4" ]; then
            echo "ERROR: Gagal mengunduh video dari YouTube. Periksa kembali YT_COOKIES Anda!"
            exit 1
          fi

          echo "--- [Langkah 2: Memproses Potong & Tempel Logo Menggunakan FFmpeg Lokal] ---"
          # FFmpeg membaca file lokal 'video_sumber_asli.mp4', bukan URL internet lagi.
          # Menjaga kualitas HD murni menggunakan kombinasi preset fast dan bitrate tinggi.
          ffmpeg -ss ${{ github.event.inputs.mulai }} -to ${{ github.event.inputs.selesai }} -i video_sumber_asli.mp4 \
          -stream_loop -1 -i "$LOGO_FILE" \
          -filter_complex \
          "[1:v]colorkey=0x009400:0.1:0.1,scale=iw*0.12:-1[logo]; \
           [0:v][logo]overlay=W-w-(W*0.02):(W*0.02):shortest=1" \
          -c:v libx264 -preset fast -b:v 8000k -maxrate 10000k -bufsize 20000k \
          -pix_fmt yuv420p -c:a aac -b:a 128k \
          hasil_super_hd_logo.mp4

          echo "--- Seluruh Proses Selesai! ---"

      - name: 5. Upload Hasil Video ke Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hasil-clipping-hd
          path: hasil_super_hd_logo.mp4
          
