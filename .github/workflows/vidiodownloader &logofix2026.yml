name: Downloader Video SUPER HD + Tempel Logo (Fix Masih Besar)

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link Video Sumber'
        required: true
      mulai:
        description: 'Mulai (Jam:Menit:Detik)'
        default: '00:00:10'
      selesai:
        description: 'Selesai (Jam:Menit:Detik)'
        default: '00:00:40'

jobs:
  proses_editing:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Tools (Engine Terbaru)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl bc
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp -U

      - name: 4. Eksekusi Potong Video + Tempel Logo (Force HD)
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          # Buat file cookies biasa
          echo "$YT_COOKIES" > cookies.txt
          
          # Memastikan file logo ada
          LOGO_FILE="logoihya2026.mp4"
          if [ ! -f "$LOGO_FILE" ]; then
            echo "ERROR: File $LOGO_FILE tidak ditemukan!"
            ls
            exit 1
          fi
          
          echo "--- [Mencari Direct Link dengan Metode FORCE HD] ---"
          
          # PERUBAHAN BESAR DISINI:
          # 1. Format diubah forcing av01/vp9 (format HD YouTube) agar tidak dikasih 360p h264.
          # 2. User-Agent disamakan dengan browser PC modern.
          
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36"
          
          VIDEO_URL=$(yt-dlp --cookies cookies.txt \
                             --js-runtime node \
                             --force-ipv4 \
                             --no-playlist \
                             --user-agent "$UA" \
                             --extractor-args "youtube:player_client=web,android" \
                             -f "((bestvideo[status!=unplayable][height>=1080][ext=mp4]/bestvideo[status!=unplayable][height>=1080])+bestaudio)/best[height>=1080]/best" \
                             -g "${{ github.event.inputs.link_youtube }}" 2>/dev/null)

          if [ -z "$VIDEO_URL" ]; then
            echo "ERROR: Gagal mendapatkan URL HD. YouTube mungkin memblokir Cookies Anda atau format HD tidak tersedia."
            echo "Mencoba fallback ke kualitas terbaik yang ada..."
            VIDEO_URL=$(yt-dlp --cookies cookies.txt --js-runtime node --force-ipv4 -f "best" -g "${{ github.event.inputs.link_youtube }}")
            if [ -z "$VIDEO_URL" ]; then exit 1; fi
          fi

          echo "--- [Memulai Pemotongan & Penempelan Logo - Kualitas Tanpa Batas] ---"
          
          # PERUBAHAN FFmpeg:
          # 1. Pakai -crf 18 (Kualitas visual lossless, file agak besar tapi dijamin jernih).
          # 2. Hapus batasan bitrate (-b:v, -maxrate) agar FFmpeg pakai bitrate asli videonya.
          # 3. Logo tetap pakai rumus Script 1: iw*0.12 (Akan mengecil jika video utama berhasil HD).

          ffmpeg -ss ${{ github.event.inputs.mulai }} -to ${{ github.event.inputs.selesai }} \
          -headers "User-Agent: $UA"$'\r\n' \
          -i "$VIDEO_URL" \
          -stream_loop -1 -i "$LOGO_FILE" \
          -filter_complex \
          "[1:v]colorkey=0x009400:0.1:0.1,scale=iw*0.12:-1[logo]; \
           [0:v][logo]overlay=W-w-(W*0.02):(W*0.02):shortest=1" \
          -c:v libx264 -preset fast -crf 18 -pix_fmt yuv420p \
          -c:a aac -b:a 192k \
          hasil_super_hd.mp4

          echo "--- Proses Selesai! ---"

      - name: 5. Upload Hasil Video
        uses: actions/upload-artifact@v4
        with:
          name: video-super-hd
          path: hasil_super_hd.mp4
          
