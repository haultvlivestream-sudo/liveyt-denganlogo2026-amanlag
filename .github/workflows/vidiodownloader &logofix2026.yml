name: Downloader Video + Kunci Ukuran Logo 130px (Full Fix)

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link YouTube (Video Sumber)'
        required: true
      mulai:
        description: 'Mulai (Jam:Menit:Detik)'
        default: '00:00:10'
      selesai:
        description: 'Selesai (Jam:Menit:Detik)'
        default: '00:00:40'

jobs:
  proses_editing:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Tools (Engine Terkuat)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl bc
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp -U

      - name: 4. Eksekusi Download & Pemrosesan Lokal
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          echo "$YT_COOKIES" > cookies.txt
          
          # Hapus sisa file lama agar tidak bentrok atau terbaca cache
          rm -f video_sumber_asli.mp4 hasil_*.mp4
          
          # Memastikan file logo ada
          LOGO_FILE="logoihya2026.mp4"
          if [ ! -f "$LOGO_FILE" ]; then
            echo "ERROR: File $LOGO_FILE tidak ditemukan di repository!"
            ls
            exit 1
          fi
          
          echo "--- [Langkah 1: Mengunduh Video Mentah] ---"
          yt-dlp --cookies cookies.txt \
                 --js-runtime node \
                 --force-ipv4 \
                 --no-playlist \
                 --extractor-args "youtube:player_client=web,android" \
                 -f "bestvideo+bestaudio/best" \
                 --merge-output-format mp4 \
                 -o "video_sumber_asli.mp4" \
                 "${{ github.event.inputs.link_youtube }}"

          if [ ! -f "video_sumber_asli.mp4" ]; then
            echo "ERROR: Gagal mengunduh video dari YouTube. Periksa kembali YT_COOKIES Anda!"
            exit 1
          fi

          echo "--- [Langkah 2: Memproses Potong & Kunci Logo 130px] ---"
          
          # -y dipasang untuk memaksa overwrite file baru
          # scale=130:-1 mengunci lebar logo secara mutlak di 130px
          ffmpeg -y -ss ${{ github.event.inputs.mulai }} -to ${{ github.event.inputs.selesai }} -i video_sumber_asli.mp4 \
          -stream_loop -1 -i "$LOGO_FILE" \
          -filter_complex \
          "[1:v]colorkey=0x009400:0.1:0.1,scale=130:-1[logo]; \
           [0:v][logo]overlay=W-w-15:15:shortest=1" \
          -c:v libx264 -preset fast -b:v 6000k -maxrate 8000k -bufsize 16000k \
          -pix_fmt yuv420p -c:a aac -b:a 128k \
          hasil_final_130px.mp4

          echo "--- Seluruh Proses Selesai! ---"

      - name: 5. Upload Hasil Video ke Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hasil-clipping-logo-130px
          path: hasil_final_130px.mp4
          
