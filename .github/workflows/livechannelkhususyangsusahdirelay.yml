name: LIVE FIX JULI 2026 CHANNEL KHUSUS MASJID ARRIYADH DLL IHYA' 7 TV

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link Video Sumber'
        required: true
      kunci_rtmp:
        description: 'Stream Key YouTube'
        required: true

jobs:
  streaming:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp -U

      - name: 4. Jalankan Relay Streaming
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          set +e

          if [ -n "$YT_COOKIES" ] && [ "$YT_COOKIES" != "KOSONG" ]; then
            echo "$YT_COOKIES" > cookies.txt
            COOKIE_ARG="--cookies cookies.txt"
          else
            COOKIE_ARG=""
          fi
          
          LOGO_FILE="logoihyajuni2026.mp4"
          if [ ! -f "$LOGO_FILE" ]; then
            echo "ERROR: File $LOGO_FILE tidak ditemukan!"
            ls
            exit 1
          fi

          FIXED_UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36"

          while true; do
            echo "--- [$(date)] Mengambil Stream Universal M3U8 / Live Stream ---"
            
            STREAM_URL=$(yt-dlp $COOKIE_ARG \
                                --js-runtime node \
                                --force-ipv4 \
                                --no-cache-dir \
                                --user-agent "$FIXED_UA" \
                                --extractor-args "youtube:player-client=android_vr,web_embedded,android" \
                                -f "b/best" \
                                -g "${{ github.event.inputs.link_youtube }}" 2>yt_error.log | head -n 1)

            if [ -z "$STREAM_URL" ]; then
              echo "❌ GAGAL MENDAPATKAN URL VIDEO!"
              echo "=== DETAIL ERROR DARI YT-DLP ==="
              cat yt_error.log
              echo "================================="
              echo "Menunggu 10 detik sebelum mencoba kembali..."
              sleep 10
              continue
            fi

            echo "🚀 SUMBER DITEMUKAN! Memulai FFmpeg dengan HLS Reconnect Fix..."

            # Parameter Krusial:
            # -http_persistent 0 : Matikan reuse connection (solusi error host beruabah)
            # -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 : Auto reconnect tanpa patah
            ffmpeg -hide_banner -loglevel warning \
              -http_persistent 0 \
              -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 -reconnect_delay_max 2 \
              -re -thread_queue_size 10240 -probesize 10M -analyzeduration 10M \
              -i "$STREAM_URL" \
              -stream_loop -1 -thread_queue_size 10240 -i "$LOGO_FILE" \
              -filter_complex "[0:v]scale=-2:720[mainv]; [1:v]colorkey=0x006900:0.1:0.1,scale=iw*0.13:-1[logo]; [mainv][logo]overlay=W-w-(W*0.02):(W*0.02),format=yuv420p[outv]" \
              -map "[outv]" -map 0:a? \
              -c:v libx264 -preset ultrafast -tune zerolatency \
              -b:v 3000k -maxrate 3500k -bufsize 7000k \
              -r 30 -g 60 -keyint_min 60 -sc_threshold 0 \
              -c:a aac -ar 44100 -b:a 128k \
              -f flv "rtmp://a.rtmp.youtube.com/live2/${{ github.event.inputs.kunci_rtmp }}"

            echo "⚠️ Stream terputus. Mengulang kembali dalam 10 detik..."
            sleep 10
          done
          
