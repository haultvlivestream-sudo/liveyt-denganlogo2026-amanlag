name: LIVE FIX JULI 2026 CHANNEL KHUSUS MASJID ARRIYADH DLL IHYA' 7 TV

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link Video Sumber'
        required: true
      kunci_rtmp:
        description: 'Stream Key YouTube'
        required: true

jobs:
  streaming:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp -U

      - name: 4. Jalankan Relay Streaming
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          set +e

          if [ -n "$YT_COOKIES" ] && [ "$YT_COOKIES" != "KOSONG" ]; then
            echo "$YT_COOKIES" > cookies.txt
            COOKIE_ARG="--cookies cookies.txt"
          else
            COOKIE_ARG=""
          fi
          
          LOGO_FILE="logoihyajuni2026.mp4"
          if [ ! -f "$LOGO_FILE" ]; then
            echo "ERROR: File $LOGO_FILE tidak ditemukan!"
            ls
            exit 1
          fi

          FIXED_UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36"

          while true; do
            echo "--- [$(date)] Memulai Live Stream Ultra-Fast Mode ---"

            # 1. Hapus -re di input pipe (biar tidak bottleneck speed)
            # 2. Pakai preset ultrafast tanpa scaling rumit
            yt-dlp $COOKIE_ARG \
              --js-runtime node \
              --force-ipv4 \
              --no-cache-dir \
              --user-agent "$FIXED_UA" \
              --extractor-args "youtube:player-client=android_vr,web_embedded,android" \
              -f "b/best[height<=720]/best" \
              -o - "${{ github.event.inputs.link_youtube }}" | \
            ffmpeg -hide_banner \
              -thread_queue_size 2048 -i pipe:0 \
              -stream_loop -1 -thread_queue_size 1024 -i "$LOGO_FILE" \
              -filter_complex "[1:v]colorkey=0x006900:0.1:0.1,scale=iw*0.13:-1[logo]; [0:v][logo]overlay=W-w-(W*0.02):(W*0.02),format=yuv420p[outv]" \
              -map "[outv]" -map 0:a? \
              -c:v libx264 -preset ultrafast -tune zerolatency \
              -b:v 2500k -maxrate 3000k -bufsize 6000k \
              -g 60 -keyint_min 60 -sc_threshold 0 \
              -c:a aac -ar 44100 -b:a 128k \
              -f flv "rtmp://a.rtmp.youtube.com/live2/${{ github.event.inputs.kunci_rtmp }}"

            echo "⚠️ Stream terputus. Mengulang kembali dalam 5 detik..."
            sleep 5
          done
          
