name: YouTube Relay Pro (Intro & Center Logo)

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link Video Sumber'
        required: true
      kunci_rtmp:
        description: 'Stream Key YouTube'
        required: true

jobs:
  streaming:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp -U

      - name: 4. Jalankan Relay Streaming
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          set +e
          echo "$YT_COOKIES" > cookies.txt
          
          # Validasi file aset
          if [ ! -f "logo_video.mp4" ] || [ ! -f "intrologo2026.mp4" ]; then
            echo "FATAL ERROR: File logo_video.mp4 atau intrologo2026.mp4 tidak ditemukan di repo!"
            ls -R
            exit 1
          fi

          while true; do
            echo "--- [$(date)] Mencari Direct Link ---"
            
            VIDEO_URL=$(yt-dlp --cookies cookies.txt \
                               --js-runtime node \
                               --force-ipv4 \
                               --no-playlist \
                               --extractor-args "youtube:player_client=mweb,web" \
                               -f "best[height<=720][protocol!=m3u8_native][protocol!=m3u8]" \
                               -g "${{ github.event.inputs.link_youtube }}" 2>/dev/null)

            if [ -z "$VIDEO_URL" ]; then
              VIDEO_URL=$(yt-dlp --cookies cookies.txt --js-runtime node -f "best[height<=720]" -g "${{ github.event.inputs.link_youtube }}" 2>/dev/null)
            fi

            if [ -z "$VIDEO_URL" ]; then
              echo "Gagal ambil URL. Cek Cookies!"
              sleep 5
              continue
            fi

            echo "SUMBER DITEMUKAN! Memulai FFmpeg..."

            # FILTER EXPLANATION:
            # [0:v] = Video Utama (YouTube)
            # [1:v] = Intro (Akan fade out di detik 10-12)
            # [2:v] = Logo (Diproses transparansi & diletakkan di tengah)
            
            ffmpeg -re -i "$VIDEO_URL" -i intrologo2026.mp4 -stream_loop -1 -i logo_video.mp4 \
              -filter_complex \
              "[2:v]crop=ih:ih,colorkey=0x009400:0.1:0.1,scale=150:-1[logo_clean]; \
               [1:v]fade=t=out:st=10:d=2[intro_faded]; \
               [0:v][logo_clean]overlay=(W-w)/2:(H-h)/2[v_with_logo]; \
               [v_with_logo][intro_faded]overlay=0:0:enable='lte(t,12)'[v_final]" \
              -map "[v_final]" -map 0:a \
              -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k \
              -g 60 -keyint_min 60 -sc_threshold 0 \
              -c:a aac -ar 44100 -b:a 128k \
              -f flv "rtmp://a.rtmp.youtube.com/live2/${{ github.event.inputs.kunci_rtmp }}"

            echo "Stream terputus atau video selesai. Mengulang dalam 5 detik..."
            sleep 5
          done
          
