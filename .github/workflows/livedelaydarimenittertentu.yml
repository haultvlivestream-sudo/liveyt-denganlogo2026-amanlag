name: Live Record / Delay Cutter HD (1x Intro + Custom Waktu)

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link Video Sumber'
        required: true
      kunci_rtmp:
        description: 'Stream Key YouTube'
        required: true
      waktu_mulai:
        description: 'Waktu Mulai (Contoh: 00:00:00)'
        required: true
        default: '00:00:00'
      waktu_selesai:
        description: 'Waktu Selesai (Contoh: 00:05:00 - Kosongkan jika sampai habis)'
        required: false
        default: ''

jobs:
  streaming:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 4. Jalankan Live Delay & Cutter
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          set +e

          if [ -n "$YT_COOKIES" ] && [ "$YT_COOKIES" != "KOSONG" ]; then
            echo "$YT_COOKIES" > cookies.txt
            COOKIE_ARG="--cookies cookies.txt"
          else
            COOKIE_ARG=""
          fi
          
          LOGO_FILE="logoihyajuni2026.mp4"
          INTRO_FILE="intrologoihya7tvjuli2026.mp4"

          if [ ! -f "$LOGO_FILE" ]; then
            echo "ERROR: File $LOGO_FILE tidak ditemukan!"
            ls
            exit 1
          fi

          if [ ! -f "$INTRO_FILE" ]; then
            echo "ERROR: File $INTRO_FILE tidak ditemukan!"
            ls
            exit 1
          fi

          # Mengambil durasi asli intro (1x putar)
          INTRO_DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$INTRO_FILE")
          # Waktu mulai pudar (3 detik sebelum intro habis)
          FADE_START=$(awk "BEGIN {print $INTRO_DURATION - 3}")
          if (( $(echo "$FADE_START < 0" | bc -l) )); then
            FADE_START=0
          fi

          echo "Durasi Intro: $INTRO_DURATION detik (Diputar 1x)."
          echo "Efek Pudar (Fade Out Transparan 3 Detik) akan dimulai pada detik ke: $FADE_START"

          FIXED_UA="Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Mobile Safari/537.36"

          echo "--- Mencari Kualitas Tertinggi Sumber ---"
          
          # Cek tinggi resolusi asli video dari yt-dlp
          HEIGHT=$(yt-dlp $COOKIE_ARG \
                          --js-runtime node \
                          --force-ipv4 \
                          --no-cache-dir \
                          --user-agent "$FIXED_UA" \
                          --extractor-args "youtube:player-client=android,web" \
                          -f "bestvideo+bestaudio/best" \
                          --print height "${{ github.event.inputs.link_youtube }}" 2>/dev/null | head -n 1)

          # Menjalankan yt-dlp untuk ambil URL stream
          VIDEO_URL=$(yt-dlp $COOKIE_ARG \
                              --js-runtime node \
                              --force-ipv4 \
                              --no-cache-dir \
                              --user-agent "$FIXED_UA" \
                              --extractor-args "youtube:player-client=android,web" \
                              -f "bestvideo+bestaudio/best" \
                              -g "${{ github.event.inputs.link_youtube }}" 2>yt_error.log)

          if [ -z "$VIDEO_URL" ]; then
            echo "❌ GAGAL MENDAPATKAN URL VIDEO!"
            echo "=== DETAIL ERROR DARI YT-DLP ==="
            cat yt_error.log
            echo "================================="
            exit 1
          fi

          if [ -z "$HEIGHT" ]; then
            HEIGHT=1080
          fi

          echo "🔍 Resolusi Sumber Terdeteksi: ${HEIGHT}p"

          # Menyiapkan argumen waktu mulai & selesai untuk ffmpeg
          SS_ARG="-ss ${{ github.event.inputs.waktu_mulai }}"
          TO_ARG=""
          if [ -n "${{ github.event.inputs.waktu_selesai }}" ]; then
            TO_ARG="-to ${{ github.event.inputs.waktu_selesai }}"
          fi

          if [ "$HEIGHT" -ge 1080 ]; then
            echo "🚀 SUMBER 1080p DITEMUKAN! Memulai FFmpeg 1080p Profile..."

            ffmpeg -re $SS_ARG $TO_ARG -i "$VIDEO_URL" \
              -stream_loop -1 -i "$LOGO_FILE" \
              -i "$INTRO_FILE" \
              -filter_complex "[1:v]colorkey=0x006900:0.1:0.1,scale=iw*0.15:-1[logo]; [0:v][logo]overlay=W-w-(W*0.02):(W*0.02)[main_with_logo]; [2:v]scale=1920:1080,format=pix_fmts=yuva420p,fade=t=out:st=$FADE_START:d=3:alpha=1[intro_faded]; [main_with_logo][intro_faded]overlay=x='(W-w)/2':y='(H-h)/2':format=auto:enable='lte(t,$INTRO_DURATION)'" \
              -c:v libx264 -preset superfast -b:v 6000k -maxrate 8000k -bufsize 12000k \
              -pix_fmt yuv420p -g 60 -keyint_min 60 -sc_threshold 0 \
              -c:a aac -ar 44100 -b:a 128k \
              -f flv "rtmp://a.rtmp.youtube.com/live2/${{ github.event.inputs.kunci_rtmp }}"

          else
            echo "🚀 SUMBER 720p DITEMUKAN! Memulai FFmpeg 720p Profile..."

            ffmpeg -re $SS_ARG $TO_ARG -i "$VIDEO_URL" \
              -stream_loop -1 -i "$LOGO_FILE" \
              -i "$INTRO_FILE" \
              -filter_complex "[0:v]scale=1280:720[main_v]; [1:v]colorkey=0x006900:0.1:0.1,scale=iw*0.13:-1[logo]; [main_v][logo]overlay=W-w-(W*0.02):(W*0.02)[main_with_logo]; [2:v]scale=1280:720,format=pix_fmts=yuva420p,fade=t=out:st=$FADE_START:d=3:alpha=1[intro_faded]; [main_with_logo][intro_faded]overlay=x='(W-w)/2':y='(H-h)/2':format=auto:enable='lte(t,$INTRO_DURATION)'" \
              -c:v libx264 -preset superfast -b:v 3000k -maxrate 4000k -bufsize 6000k \
              -pix_fmt yuv420p -g 60 -keyint_min 60 -sc_threshold 0 \
              -c:a aac -ar 44100 -b:a 128k \
              -f flv "rtmp://a.rtmp.youtube.com/live2/${{ github.event.inputs.kunci_rtmp }}"

          fi

          echo "✅ Streaming selesai sesuai durasi yang diminta."
