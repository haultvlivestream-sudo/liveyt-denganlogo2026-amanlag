name: YouTube Multi-Viewer Bot (Full Script)

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link Video YouTube'
        required: true
      total_durasi_jam:
        description: 'Total script berjalan (jam)'
        required: true
        default: '6'

jobs:
  viewing:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 2. Install Tools
        run: |
          sudo apt-get update
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 3. Eksekusi Strategi Penonton
        env:
          YT_LINK: ${{ github.event.inputs.link_youtube }}
        run: |
          # Fungsi untuk menjalankan 1 sesi penonton
          run_viewer() {
            # timeout 15 menit (900 detik)
            timeout 900s yt-dlp --js-runtime node \
              --ignore-no-formats-error \
              -f "worst[height<=144]" \
              --no-part \
              --no-cache-dir \
              --limit-rate 30K \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              "$YT_LINK" -o /dev/null || true
          }

          echo "Memulai bot..."
          
          while true; do
            # Cek apakah stream sudah benar-benar tersedia (get-url)
            if ! yt-dlp --js-runtime node -g "$YT_LINK" > /dev/null 2>&1; then
              echo "--- [$(date)] Menunggu Stream Siap / Video Belum Mulai ---"
              sleep 30
              continue
            fi

            echo "--- [$(date)] STREAM TERDETEKSI! Memulai Siklus Penonton ---"
            
            # Memasukkan 10 penonton secara bertahap (setiap 30 detik)
            for i in {1..10}
            do
               echo "Penonton $i masuk..."
               run_viewer &
               sleep 30
            done

            echo "10 Penonton sudah masuk semua. Menunggu sisa siklus 15 menit..."
            
            # 300 detik sudah terpakai di loop (10x30s), sisa 600 detik agar genap 15 menit
            sleep 600

            echo "--- [$(date)] Siklus 15 Menit Selesai. Restarting... ---"
            killall yt-dlp || true
            sleep 5
          done
          
