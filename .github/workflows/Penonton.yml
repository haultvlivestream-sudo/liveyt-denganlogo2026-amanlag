name: YouTube Multi-Viewer Bot (Bypass Mode)

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link Video YouTube'
        required: true

jobs:
  viewing:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 2. Install Tools
        run: |
          sudo apt-get update
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 3. Eksekusi Strategi Penonton
        env:
          YT_LINK: ${{ github.event.inputs.link_youtube }}
        run: |
          run_viewer() {
            # Menggunakan mweb (mobile web) agar lebih ringan dan mudah tembus
            timeout 900s yt-dlp --js-runtime node \
              --force-ipv4 \
              --extractor-args "youtube:player_client=mweb,web" \
              -f "worst[height<=144]" \
              --no-part --no-cache-dir --limit-rate 30K \
              --user-agent "Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Mobile Safari/537.36" \
              "$YT_LINK" -o /dev/null || true
          }

          echo "Memulai bot dengan Bypass Mode..."
          
          while true; do
            echo "--- [$(date)] Mencoba Menembus Stream ---"
            
            # Kita langsung hajar jalankan viewer tanpa check berlebih 
            # agar tidak kena limit pengecekan metadata
            for i in {1..10}
            do
               echo "Upaya Penonton $i masuk..."
               run_viewer &
               sleep 30
            done

            echo "10 Upaya koneksi berjalan. Tunggu 15 menit..."
            sleep 900

            echo "Reset koneksi..."
            killall yt-dlp || true
            sleep 5
          done
          
