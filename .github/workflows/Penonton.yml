name: YouTube Multi-Viewer Bot (Final Fix - FFmpeg)

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link Video YouTube'
        required: true

jobs:
  viewing:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 2. Install Tools (FFmpeg & yt-dlp)
        run: |
          sudo apt-get update
          # Menginstal ffmpeg secara eksplisit
          sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 3. Eksekusi Strategi Penonton
        env:
          YT_LINK: ${{ github.event.inputs.link_youtube }}
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          echo "$YT_COOKIES" > cookies.txt

          run_viewer() {
            # Menambahkan --ffmpeg-location agar yt-dlp tidak bingung
            timeout 900s yt-dlp --js-runtime node \
              --cookies cookies.txt \
              --force-ipv4 \
              --extractor-args "youtube:player_client=mweb,web" \
              -f "worst[height<=144]" \
              --no-part --no-cache-dir --limit-rate 50K \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              "$YT_LINK" -o /dev/null || true
          }

          echo "Memulai bot dengan FFmpeg Support..."
          
          while true; do
            echo "--- [$(date)] Siklus 15 Menit Dimulai ---"
            
            for i in {1..10}
            do
               echo "Penonton $i masuk..."
               run_viewer &
               sleep 30
            done

            echo "10 Penonton sedang aktif..."
            sleep 900

            echo "Siklus selesai. Membersihkan proses..."
            killall yt-dlp || true
            sleep 5
          done
          
