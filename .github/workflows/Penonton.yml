name: YouTube Multi-Viewer Bot (Cookies Bypass)

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link Video YouTube'
        required: true

jobs:
  viewing:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 2. Install Tools
        run: |
          sudo apt-get update
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 3. Eksekusi Strategi Penonton
        env:
          YT_LINK: ${{ github.event.inputs.link_youtube }}
          YT_COOKIES: ${{ secrets.YT_COOKIES }} # Mengambil cookies dari Secret GitHub
        run: |
          # Simpan cookies ke file temporary
          echo "$YT_COOKIES" > cookies.txt

          run_viewer() {
            # Menggunakan --cookies cookies.txt untuk bypass deteksi bot
            timeout 900s yt-dlp --js-runtime node \
              --cookies cookies.txt \
              --force-ipv4 \
              --extractor-args "youtube:player_client=mweb,web" \
              -f "worst[height<=144]" \
              --no-part --no-cache-dir --limit-rate 30K \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              "$YT_LINK" -o /dev/null || true
          }

          echo "Memulai bot dengan Cookies Bypass..."
          
          while true; do
            echo "--- [$(date)] Mencoba Menembus Stream dengan Cookies ---"
            
            for i in {1..10}
            do
               echo "Penonton $i masuk..."
               run_viewer &
               sleep 30
            done

            echo "10 Penonton sedang berjalan. Menunggu 15 menit..."
            sleep 900

            echo "Reset koneksi..."
            killall yt-dlp || true
            sleep 5
          done
          
