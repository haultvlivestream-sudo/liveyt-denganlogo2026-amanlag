name: Live Bantu Asamani Part 2

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link Video Sumber'
        required: true
      kunci_rtmp:
        description: 'Stream Key YouTube'
        required: true

jobs:
  streaming:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # FIX: Memaksa Github Actions memperbarui PATH sistem agar Node.js terbaca global oleh yt-dlp
      - name: Fix Node.js Path
        run: echo "$(dirname $(which node))" >> $GITHUB_PATH

      - name: 3. Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp -U

      - name: 4. Jalankan Relay Streaming
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          # set +e digunakan agar jika yt-dlp/ffmpeg gagal, loop tetap berjalan tidak langsung mati
          set +e
          echo "$YT_COOKIES" > cookies.txt
          
          # Cek file logo utama kamu
          if [ ! -f "logoasamanitv.mp4" ]; then
            echo "FATAL ERROR: File logoasamanitv.mp4 tidak ditemukan di repository!"
            ls -R
            exit 1
          fi

          while true; do
            echo "--- [$(date)] Mencari Direct Link Kualitas Tertinggi ---"
            
            # RESOLUSI TERTINGGI: Batasan height dicopot agar dapet kualitas maksimal (2K/1080p/720p tergantung sumber)
            # ERROR LOG: 2>/dev/null dihapus supaya kalau node js error, pesan errornya muncul di log GitHub
            VIDEO_URL=$(yt-dlp --cookies cookies.txt \
                               --js-runtime node \
                               --force-ipv4 \
                               --no-playlist \
                               --extractor-args "youtube:player_client=mweb,web" \
                               -f "best[protocol!=m3u8_native][protocol!=m3u8]" \
                               -g "${{ github.event.inputs.link_youtube }}")

            if [ -z "$VIDEO_URL" ]; then
              VIDEO_URL=$(yt-dlp --cookies cookies.txt --js-runtime node -f "best" -g "${{ github.event.inputs.link_youtube }}")
            fi

            if [ -z "$VIDEO_URL" ]; then
              echo "Gagal ambil URL. Cek Cookies atau Log Error Node diatas!"
              sleep 10
              continue
            fi

            echo "SUMBER DITEMUKAN! Memulai FFmpeg..."

            # FILTER LOGO PROPORSIONAL: Menggunakan scale2ref agar logo otomatis berukuran 7% dari lebar video utama.
            # Jadi, mau dapet resolusi 720p atau 1080p atau bahkan 4K, ukuran besar logonya akan selalu seimbang (tidak mengecil).
            ffmpeg -re -i "$VIDEO_URL" \
              -stream_loop -1 -i logoasamanitv.mp4 \
              -filter_complex "[1:v]crop=ih:ih,colorkey=0x0505C8:0.1:0.1[logo_trans]; [0:v][logo_trans]scale2ref=w='iw*0.07':h='ow/mdar'[main][logo]; [main][logo]overlay=W-w-25:25:shortest=1" \
              -c:v libx264 -preset veryfast -b:v 5000k -maxrate 6000k -bufsize 10000k \
              -g 60 -keyint_min 60 -sc_threshold 0 \
              -c:a aac -ar 44100 -b:a 128k \
              -f flv "rtmp://x.rtmp.youtube.com/live2/${{ github.event.inputs.kunci_rtmp }}"

            echo "Stream terputus atau selesai. Mengulang mencari link dalam 5 detik..."
            sleep 5
          done
          
