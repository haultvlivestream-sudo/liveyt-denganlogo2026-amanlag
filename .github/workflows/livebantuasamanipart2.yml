name: Live Bantu Asamani Part 2

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link Video Sumber'
        required: true
      kunci_rtmp:
        description: 'Stream Key YouTube'
        required: true

jobs:
  streaming:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # FIX PATH: Memastikan Node.js terbaca global oleh yt-dlp di GitHub Actions
      - name: Fix Node.js Path
        run: echo "$(dirname $(which node))" >> $GITHUB_PATH

      - name: 3. Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp -U

      - name: 4. Jalankan Relay Streaming
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          set +e
          echo "$YT_COOKIES" > cookies.txt
          
          # Memastikan file logo utama kamu ada
          LOGO_FILE="logoasamanitv.mp4"
          if [ ! -f "$LOGO_FILE" ]; then
            echo "ERROR: File $LOGO_FILE tidak ditemukan!"
            ls
            exit 1
          fi

          while true; do
            echo "--- [$(date)] Mencari Kualitas Tertinggi ---"
            
            # MEMISAHKAN DIRECT URL VIDEO DAN AUDIO (Agar Mendapatkan Resolusi Tertinggi Nyata)
            # Baris pertama diambil sebagai Video, baris kedua diambil sebagai Audio
            STREAM_LINKS=$(yt-dlp --cookies cookies.txt \
                                 --js-runtime node \
                                 --force-ipv4 \
                                 -f "bestvideo+bestaudio/best" \
                                 -g "${{ github.event.inputs.link_youtube }}" 2>/dev/null)

            VIDEO_URL=$(echo "$STREAM_LINKS" | sed -n '1p')
            AUDIO_URL=$(echo "$STREAM_LINKS" | sed -n '2p')

            # Jika Audio URL kosong, berarti video tersebut tipe format 'best' gabungan (single url)
            if [ -z "$AUDIO_URL" ]; then
              AUDIO_URL="$VIDEO_URL"
            fi

            if [ -z "$VIDEO_URL" ]; then
              echo "Gagal ambil URL. Cek Cookies atau Link!"
              sleep 5
              continue
            fi

            echo "SUMBER DITEMUKAN! Memulai FFmpeg dengan Jalur Video & Audio Terpisah..."

            # EKSEKUSI FFMPEG DIRECT STREAM FIX:
            # -i [0] = Jalur Video Utama
            # -i [1] = Jalur Audio Utama
            # -i [2] = File Logo Kamu
            # Mencegah Error 403 dengan menyisipkan headers & cookies di tiap input network YouTube
            
            ffmpeg -re \
              -headers "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" -cookies_file cookies.txt -i "$VIDEO_URL" \
              -headers "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" -cookies_file cookies.txt -i "$AUDIO_URL" \
              -stream_loop -1 -i "$LOGO_FILE" \
              -filter_complex \
              "[2:v]colorkey=0x0505C8:0.1:0.1,scale=iw*0.12:-1[logo]; \
               [0:v][logo]overlay=W-w-(W*0.02):(W*0.02):shortest=1" \
              -map 1:a \
              -c:v libx264 -preset ultrafast -b:v 8000k -maxrate 10000k -bufsize 20000k \
              -pix_fmt yuv420p -g 60 -keyint_min 60 -sc_threshold 0 \
              -c:a aac -ar 44100 -b:a 128k \
              -f flv "rtmp://x.rtmp.youtube.com/live2/${{ github.event.inputs.kunci_rtmp }}"

            echo "Stream terputus. Mengulang dalam 5 detik..."
            sleep 5
          done
          
