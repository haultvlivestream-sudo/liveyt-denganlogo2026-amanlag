name: Live Bantu Asamani Part 2

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link Video Sumber'
        required: true
      kunci_rtmp:
        description: 'Stream Key YouTube'
        required: true

jobs:
  streaming:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4 # PENTING: Agar file logoasamanitv.mp4 di repo bisa terbaca

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp -U

      - name: 4. Jalankan Relay Streaming
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          # set -e diaktifkan agar script langsung stop jika ada command yang gagal/error
          set -e
          
          echo "$YT_COOKIES" > cookies.txt
          
          # Cek apakah file logo benar-benar ada di folder repo
          if [ ! -f "logoasamanitv.mp4" ]; then
            echo "FATAL ERROR: File logoasamanitv.mp4 tidak ditemukan di repository!"
            ls -R # List file untuk debugging
            exit 1
          fi

          echo "--- [$(date)] Mencari Direct Link ---"
          
          # Ambil URL menggunakan opsi utama
          VIDEO_URL=$(yt-dlp --cookies cookies.txt \
                             --js-runtime node \
                             --force-ipv4 \
                             --no-playlist \
                             --extractor-args "youtube:player_client=mweb,web" \
                             -f "best[height<=720][protocol!=m3u8_native][protocol!=m3u8]" \
                             -g "${{ github.event.inputs.link_youtube }}" 2>/dev/null) || true

          # Jika kosong, coba opsi backup
          if [ -z "$VIDEO_URL" ]; then
            VIDEO_URL=$(yt-dlp --cookies cookies.txt --js-runtime node -f "best[height<=720]" -g "${{ github.event.inputs.link_youtube }}" 2>/dev/null) || true
          fi

          # Jika masih kosong, hentikan workflow
          if [ -z "$VIDEO_URL" ]; then
            echo "FATAL ERROR: Gagal ambil URL. Cek Cookies!"
            exit 1
          fi

          echo "SUMBER DITEMUKAN! Memulai FFmpeg..."

          # POSISI LOGO DISESUAIKAN: overlay=W-w-20:20 (Lebih ke atas dan lebih ke kanan)
          ffmpeg -re -i "$VIDEO_URL" \
            -stream_loop -1 -i logoasamanitv.mp4 \
            -filter_complex "[1:v]colorkey=0x0505C8:0.1:0.1,scale=70:-1[logo]; [0:v][logo]overlay=W-w-20:20:shortest=1" \
            -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k \
            -g 60 -keyint_min 60 -sc_threshold 0 \
            -c:a aac -ar 44100 -b:a 128k \
            -f flv "rtmp://a.rtmp.youtube.com/live2/${{ github.event.inputs.kunci_rtmp }}"

          echo "--- [$(date)] Stream selesai atau terputus ---"
          
