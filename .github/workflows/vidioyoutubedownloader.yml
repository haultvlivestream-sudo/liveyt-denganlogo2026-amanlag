name: VIDIO DOWNLOADER YOUTUBE FIX JULI 2026 HD 1080p

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Masukkan Link Video YouTube'
        required: true
      waktu_mulai:
        description: 'Waktu Mulai Potongan (Format: JJ:MM:DD)'
        required: true
        default: '00:00:00'
      waktu_selesai:
        description: 'Waktu Selesai Potongan (Format: JJ:MM:DD)'
        required: true
        default: '00:00:30'

jobs:
  download_video:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp -U

      - name: 4. Proses Download dan Potong Video
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "$YT_COOKIES" ] && [ "$YT_COOKIES" != "KOSONG" ]; then
            echo "$YT_COOKIES" > cookies.txt
            COOKIE_ARG="--cookies cookies.txt"
          else
            COOKIE_ARG=""
          fi

          START_TIME="${{ github.event.inputs.waktu_mulai }}"
          END_TIME="${{ github.event.inputs.waktu_selesai }}"
          FIXED_UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"

          echo "🚀 Memulai download potongan video..."
          
          # Mendownload langsung potongan video dalam resolusi 1080p dan menyimpannya menjadi file bernama 'hasil_potongan.mp4'
          yt-dlp $COOKIE_ARG \
            --js-runtime node \
            --force-ipv4 \
            --no-cache-dir \
            --user-agent "$FIXED_UA" \
            --extractor-args "youtube:player-client=web,android" \
            -f "bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/best" \
            --download-sections "*${START_TIME}-${END_TIME}" \
            --force-keyframes-at-cuts \
            -o "hasil_potongan.mp4" \
            "${{ github.event.inputs.link_youtube }}"

      - name: 5. Upload Hasil Video Sebagai Link Download
        uses: actions/upload-artifact@v4
        with:
          name: hasil-download-video
          path: hasil_potongan.mp4
          retention-days: 1
          
