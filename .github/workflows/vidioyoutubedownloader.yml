name: VIDIO DOWNLOADER YOUTUBE FIX JULI 2026 HD 1080p

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Masukkan Link Video YouTube'
        required: true
      waktu_mulai:
        description: 'Waktu Mulai Potongan (Format: JJ:MM:DD)'
        required: true
        default: '00:00:00'
      waktu_selesai:
        description: 'Waktu Selesai Potongan (Format: JJ:MM:DD)'
        required: true
        default: '00:00:30'

jobs:
  download_video:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Deno (JS Solver Wajib untuk Android/Web Client 2026)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x

      - name: 3. Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp -U

      - name: 4. Proses Download, Potong, dan Re-encode Video (HD 1080p)
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          START_TIME="${{ github.event.inputs.waktu_mulai }}"
          END_TIME="${{ github.event.inputs.waktu_selesai }}"
          
          # [No 1] Penguncian User-Agent Manusia (Chrome Android Asli)
          FIXED_UA="Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Mobile Safari/537.36"
          
          if [ -n "$YT_COOKIES" ] && [ "$YT_COOKIES" != "KOSONG" ]; then
            echo "$YT_COOKIES" > cookies.txt
            COOKIE_ARG="--cookies cookies.txt"
          else
            COOKIE_ARG=""
          fi

          echo "🚀 Memulai download dan pemotongan video..."

          # Menjalankan download dengan 5 Poin Optimasi Anda:
          # - [No 1] User-Agent Chrome Android Manusia
          # - [No 2] Client dibatasi ke 'android,web' agar sukses membaca cookies Anda
          # - [No 3] Parameter ':shortest=1' tidak ada di dalam konversi FFmpeg
          # - [No 4 & 5] Parameter FFmpeg ditaruh langsung di downloader-args
          yt-dlp $COOKIE_ARG \
            --js-runtime deno \
            --remote-components ejs:github \
            --force-ipv4 \
            --no-cache-dir \
            --user-agent "$FIXED_UA" \
            --extractor-args "youtube:player-client=android,web" \
            -f "bestvideo[height<=1080]+bestaudio/best" \
            --download-sections "*${START_TIME}-${END_TIME}" \
            --force-keyframes-at-cuts \
            --downloader ffmpeg \
            --downloader-args "ffmpeg:-vf scale=1920:1080 -c:v libx264 -preset superfast -b:v 6000k -maxrate 8000k -bufsize 12000k -pix_fmt yuv420p -g 60 -keyint_min 60 -sc_threshold 0 -c:a aac -ar 44100 -b:a 128k" \
            -o "hasil_potongan.mp4" \
            "${{ github.event.inputs.link_youtube }}"

      - name: 5. Upload Hasil Video Sebagai Link Download
        uses: actions/upload-artifact@v4
        with:
          name: hasil-download-video
          path: hasil_potongan.mp4
          retention-days: 1
          
