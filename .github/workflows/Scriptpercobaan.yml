name: Live Streaming Fix Juli 2026 INTRO 2X IHYA' 7 TV 

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link Video Sumber'
        required: true
      kunci_rtmp:
        description: 'Stream Key YouTube'
        required: true

jobs:
  streaming:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp -U

      - name: 4. Jalankan Relay Streaming
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          set +e

          if [ -n "$YT_COOKIES" ] && [ "$YT_COOKIES" != "KOSONG" ]; then
            echo "$YT_COOKIES" > cookies.txt
            COOKIE_ARG="--cookies cookies.txt"
          else
            COOKIE_ARG=""
          fi
          
          LOGO_FILE="logoihyajuni2026.mp4"
          INTRO_FILE="intrologoihya7tvjuli2026.mp4"

          if [ ! -f "$LOGO_FILE" ]; then
            echo "ERROR: File $LOGO_FILE tidak ditemukan!"
            ls
            exit 1
          fi

          if [ ! -f "$INTRO_FILE" ]; then
            echo "ERROR: File $INTRO_FILE tidak ditemukan!"
            ls
            exit 1
          fi

          # Mengambil durasi asli intro
          INTRO_DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$INTRO_FILE")
          # Total durasi untuk 2 kali putar
          TOTAL_INTRO_DURATION=$(awk "BEGIN {print $INTRO_DURATION * 2}")
          # Waktu mulai pudar (3 detik sebelum intro habis)
          FADE_START=$(awk "BEGIN {print $TOTAL_INTRO_DURATION - 3}")

          echo "Durasi Intro: $INTRO_DURATION detik. Total Jalan 2x: $TOTAL_INTRO_DURATION detik."
          echo "Efek Pudar (Fade Out Transparan 3 Detik) akan dimulai pada detik ke: $FADE_START"

          # KUNCI UTAMA: Mengunci User-Agent Chrome Android Manusia asli
          FIXED_UA="Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Mobile Safari/537.36"

          while true; do
            echo "--- [$(date)] Mencari Kualitas Tertinggi via Sesi Android Manusia ---"
            
            VIDEO_URL=$(yt-dlp $COOKIE_ARG \
                                --js-runtime node \
                                --force-ipv4 \
                                --no-cache-dir \
                                --user-agent "$FIXED_UA" \
                                --extractor-args "youtube:player-client=android,web" \
                                -f "bestvideo+bestaudio/best" \
                                -g "${{ github.event.inputs.link_youtube }}" 2>yt_error.log)

            if [ -z "$VIDEO_URL" ]; then
              echo "❌ GAGAL MENDAPATKAN URL VIDEO!"
              echo "=== DETAIL ERROR DARI YT-DLP ==="
              cat yt_error.log
              echo "================================="
              echo "Menunggu 10 detik sebelum mencoba kembali..."
              sleep 10
              continue
            fi

            echo "🚀 SUMBER DITEMUKAN! Memulai FFmpeg..."

            # FILTER FINAL TANPA ERROR SYNTAX & ADAPTIF RESOLUSI:
            # 1. Logo di-scale 15% dari lebar video utama ([1:v] -> [logo]).
            # 2. Intro di-scale otomatis presisi menyamakan ukuran video utama ([2:v][0:v]scale2ref).
            # 3. Output unused_ref dibuang ke nullsink agar FFmpeg tidak protes 'unconnected output'.
            ffmpeg -re -i "$VIDEO_URL" \
              -stream_loop -1 -i "$LOGO_FILE" \
              -stream_loop 1 -i "$INTRO_FILE" \
              -filter_complex "[1:v]colorkey=0x006900:0.1:0.1,scale=iw*0.15:-1[logo]; \
                               [0:v][logo]overlay=W-w-(W*0.02):(W*0.02)[main_with_logo]; \
                               [2:v][0:v]scale2ref[intro_scaled][unused_ref]; \
                               [unused_ref]nullsink; \
                               [intro_scaled]format=pix_fmts=yuva420p,fade=t=out:st=$FADE_START:d=3:alpha=1[intro_faded]; \
                               [main_with_logo][intro_faded]overlay=x=0:y=0:format=auto:enable='lte(t,$TOTAL_INTRO_DURATION)'" \
              -c:v libx264 -preset superfast -b:v 6000k -maxrate 8000k -bufsize 12000k \
              -pix_fmt yuv420p -g 60 -keyint_min 60 -sc_threshold 0 \
              -c:a aac -ar 44100 -b:a 128k \
              -f flv "rtmp://a.rtmp.youtube.com/live2/${{ github.event.inputs.kunci_rtmp }}"

            echo "⚠️ Stream terputus. Mengulang kembali dalam 10 detik..."
            sleep 10
          done
          
