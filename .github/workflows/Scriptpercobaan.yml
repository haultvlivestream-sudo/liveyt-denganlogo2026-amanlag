name: Potong Video YouTube (1080p Ultra HD)

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link YouTube (Video Sumber)'
        required: true
      mulai:
        description: 'Mulai (Jam:Menit:Detik)'
        default: '00:00:10'
      selesai:
        description: 'Selesai (Jam:Menit:Detik)'
        default: '00:00:40'

jobs:
  proses_editing:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Tools & Pemicu Solver JavaScript
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl bc
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          
          # Memastikan Node.js terdaftar di path utama sistem agar n-challenge solver aktif otomatis
          sudo ln -sf $(which node) /usr/bin/node
          sudo ln -sf $(which node) /usr/local/bin/node

      - name: 4. Eksekusi Potong Video (Bypass Ketat & Kebal Error)
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          # Simpan cookies jika ada
          if [ -n "$YT_COOKIES" ]; then
            echo "$YT_COOKIES" > cookies.txt
            COOKIE_ARG="--cookies cookies.txt"
          else
            COOKIE_ARG=""
          fi
          
          echo "--- [Mencari Direct Link dengan Sistem Bypass n-Challenge] ---"
          FIXED_UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
          
          # Perbaikan: Menghapus --javascript-delay yang tidak valid
          VIDEO_URL=$(yt-dlp $COOKIE_ARG \
                             --force-ipv4 \
                             --no-playlist \
                             --user-agent "$FIXED_UA" \
                             --extractor-args "youtube:client=web,android;player_skip=web_embedded_iframe" \
                             -f "bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/bestvideo[height<=1080]+bestaudio/best[height<=1080]/best/mp4" \
                             -g "${{ github.event.inputs.link_youtube }}")

          # Jika mode 1080p strict masih tertahan, gunakan fallback sapu jagat (pasti dapat link)
          if [ -z "$VIDEO_URL" ]; then
            echo "WARNING: Mode ketat diblokir, mengaktifkan mode Fallback Sapu Jagat..."
            VIDEO_URL=$(yt-dlp $COOKIE_ARG --force-ipv4 --user-agent "$FIXED_UA" -f "best" -g "${{ github.event.inputs.link_youtube }}")
          fi

          if [ -z "$VIDEO_URL" ]; then
            echo "ERROR: YouTube benar-benar memblokir IP Runner ini. Cek kembali link atau cookies Anda."
            exit 1
          fi

          echo "--- [Memulai Pemotongan Video 1080p High-Bitrate] ---"
          ffmpeg -ss ${{ github.event.inputs.mulai }} -to ${{ github.event.inputs.selesai }} -i "$VIDEO_URL" \
          -c:v libx264 -preset superfast -crf 17 \
          -maxrate 8000k -bufsize 12000k \
          -c:a aac -b:a 320k -movflags +faststart \
          hasil_1080p_jernih.mp4

      - name: 5. Upload Hasil Video
        uses: actions/upload-artifact@v4
        with:
          name: video-potong-1080p
          path: hasil_1080p_jernih.mp4
          
