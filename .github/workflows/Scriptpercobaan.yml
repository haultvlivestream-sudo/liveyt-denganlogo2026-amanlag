name: Live PERCOBAAN Streaming Fix 2026 | Resolusi Tertinggi

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link Video Sumber'
        required: true
      kunci_rtmp:
        description: 'Stream Key YouTube'
        required: true

jobs:
  streaming:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp -U

      - name: 4. Jalankan Relay Streaming
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          # Menyimpan cookies jika tersedia
          if [ -n "$YT_COOKIES" ]; then
            echo "$YT_COOKIES" > cookies.txt
            COOKIE_ARG="--cookies cookies.txt"
          else
            COOKIE_ARG=""
          fi
          
          # Memastikan file logo ada (Nama file: logoihyajuni2026.mp4)
          LOGO_FILE="logoihyajuni2026.mp4"
          if [ ! -f "$LOGO_FILE" ]; then
            echo "ERROR: File $LOGO_FILE tidak ditemukan!"
            ls
            exit 1
          fi

          while true; do
            echo "--- [$(date)] Mencari Kualitas Tertinggi ---"
            
            # Ditambahkan opsi extractor-args untuk meniru client Android VR / IOS guna meminimalisir bot-detection
            VIDEO_URL=$(yt-dlp $COOKIE_ARG \
                                --js-runtime node \
                                --force-ipv4 \
                                --extractor-args "youtube:player-client=ios,android_vr" \
                                -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
                                -g "${{ github.event.inputs.link_youtube }}" 2>/dev/null)

            if [ -z "$VIDEO_URL" ]; then
              echo "Gagal mengambil URL video. Menunggu 10 detik sebelum mencoba kembali..."
              sleep 10
              continue
            fi

            echo "SUMBER DITEMUKAN! Memulai FFmpeg..."

            # FILTER & ENCODING OPTIMIZATION:
            # 1. Mengubah preset ke 'superfast' atau 'veryfast' agar kompresi bit lebih stabil di jaringan GitHub.
            # 2. Mengatur ukuran buffer FFmpeg agar lebih bersahabat dengan koneksi RTMP.
            # 3. Menghapus shortest=1 di overlay karena logo menggunakan loop tanpa akhir (-stream_loop -1) 
            #    dan menggunakan spesifikasi penanganan stream input utama ([0:v]) sebagai acuan durasi utama.

            ffmpeg -re -i "$VIDEO_URL" \
              -stream_loop -1 -i "$LOGO_FILE" \
              -filter_complex "[1:v]colorkey=0x006900:0.1:0.1,scale=iw*0.13:-1[logo]; [0:v][logo]overlay=W-w-(W*0.02):(W*0.02)" \
              -c:v libx264 -preset superfast -b:v 6000k -maxrate 8000k -bufsize 12000k \
              -pix_fmt yuv420p -g 60 -keyint_min 60 -sc_threshold 0 \
              -c:a aac -ar 44100 -b:a 128k \
              -f flv "rtmp://a.rtmp.youtube.com/live2/${{ github.event.inputs.kunci_rtmp }}"

            echo "Stream terputus atau FFmpeg berhenti. Mengulang kembali dalam 10 detik..."
            sleep 10
          done
          
