name: Potong Video YouTube (1080p Ultra HD)

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link YouTube (Video Sumber)'
        required: true
      mulai:
        description: 'Mulai (Jam:Menit:Detik)'
        default: '00:00:10'
      selesai:
        description: 'Selesai (Jam:Menit:Detik)'
        default: '00:00:40'

jobs:
  proses_editing:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup Python (Wajib untuk Solusi Ini)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Install Tools & Dependensi Anti-Bot
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl bc
          # Install yt-dlp via PIP agar dependensi internal Python-nya jauh lebih matang mendeteksi format
          python -m pip install --upgrade pip
          pip install --upgrade yt-dlp

      - name: 4. Eksekusi Potong Video (Taktik Sapu Jagat Kebal Blokir)
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "$YT_COOKIES" ]; then
            echo "$YT_COOKIES" > cookies.txt
            COOKIE_ARG="--cookies cookies.txt"
          else
            COOKIE_ARG=""
          fi
          
          echo "--- [Mengekstrak dengan Taktik Bypass Format Warisan] ---"
          FIXED_UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
          
          # Trik Utama: Menggunakan format "30m/18/22/best" (Format gabungan mp4 bawaan YouTube yang bebas dari n-challenge throttling)
          # Dan menambahkan flag toleransi --ignore-errors agar skrip tidak langsung mati saat handshake awal
          yt-dlp $COOKIE_ARG \
            --force-ipv4 \
            --no-playlist \
            --ignore-errors \
            --user-agent "$FIXED_UA" \
            --extractor-args "youtube:client=web;player_skip=web_embedded_iframe,ios" \
            --download-sections "*${{ github.event.inputs.mulai }}-${{ github.event.inputs.selesai }}" \
            -f "18/22/36/17/best" \
            --force-keyframes-at-cuts \
            -o "mentah_potong.mp4" \
            "${{ github.event.inputs.link_youtube }}" || true

          # Cek apakah file berhasil diunduh
          FILE_MENTAH="mentah_potong.mp4"
          if [ ! -f "$FILE_MENTAH" ] || [ ! -s "$FILE_MENTAH" ]; then
             echo "WARNING: Format standar diblokir, mencoba ambil jalur darurat..."
             yt-dlp $COOKIE_ARG --force-ipv4 --user-agent "$FIXED_UA" -f "best" --download-sections "*${{ github.event.inputs.mulai }}-${{ github.event.inputs.selesai }}" -o "mentah_potong.mp4" "${{ github.event.inputs.link_youtube }}" || true
          fi

          if [ ! -f "$FILE_MENTAH" ] || [ ! -s "$FILE_MENTAH" ]; then
            echo "ERROR: YouTube memblokir total IP Runner ini secara permanen. Silakan coba perbarui YT_COOKIES Anda."
            exit 1
          fi

          echo "--- [Menerapkan Standar Kualitas 1080p High-Bitrate] ---"
          # FFmpeg akan memaksa upscale kembali ke kualitas tajam 1080p dengan setelan bitrate Anda
          ffmpeg -i "$FILE_MENTAH" \
          -c:v libx264 -preset superfast -crf 17 \
          -maxrate 8000k -bufsize 12000k \
          -c:a aac -b:a 320k -movflags +faststart \
          hasil_1080p_jernih.mp4

      - name: 5. Upload Hasil Video
        uses: actions/upload-artifact@v4
        with:
          name: video-potong-1080p
          path: hasil_1080p_jernih.mp4
          
