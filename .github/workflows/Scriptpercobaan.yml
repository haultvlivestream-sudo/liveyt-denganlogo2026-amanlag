name: Video Downloader & Cutter High Quality (Max Size & Jernih)

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link Video Sumber'
        required: true
      waktu_mulai:
        description: 'Waktu Mulai (Contoh: 00:00:00)'
        required: true
        default: '00:00:00'
      waktu_selesai:
        description: 'Waktu Selesai (Contoh: 00:00:30)'
        required: true
        default: '00:00:30'

jobs:
  download_cutter:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp -U

      - name: 4. Download Full Video (Kualitas Tertinggi Tanpa Kompresi)
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          set +e

          if [ -n "$YT_COOKIES" ] && [ "$YT_COOKIES" != "KOSONG" ]; then
            echo "$YT_COOKIES" > cookies.txt
            COOKIE_ARG="--cookies cookies.txt"
          else
            COOKIE_ARG=""
          fi

          FIXED_UA="Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Mobile Safari/537.36"

          echo "🚀 Mendownload video sumber kualitas mentah tertinggi..."

          yt-dlp \
            $COOKIE_ARG \
            --js-runtime node \
            --force-ipv4 \
            --no-cache-dir \
            --user-agent "$FIXED_UA" \
            --extractor-args "youtube:player-client=android,web" \
            -N 5 \
            -f "bestvideo+bestaudio/best" \
            --merge-output-format mp4 \
            -o "video_mentah.mp4" \
            "${{ github.event.inputs.link_youtube }}"

          EXIT_CODE=$?
          rm -f cookies.txt

          if [ $EXIT_CODE -ne 0 ] || [ ! -f "video_mentah.mp4" ]; then
            echo "❌ Download gagal!"
            exit 1
          fi

          echo "✅ Download video mentah selesai. Cek ukuran file mentah:"
          ls -lh video_mentah.mp4

      - name: 5. Potong Video Presisi Tinggi (High Bitrate / Ukuran Besar & Jernih)
        run: |
          echo "✂️ Memotong video dari ${{ github.event.inputs.waktu_mulai }} sampai ${{ github.event.inputs.waktu_selesai }}..."
          
          # Menggunakan -ss sebelum -i (akurat), dan -crf 12 (kualitas tinggi, ukuran file besar/padat)
          ffmpeg -y -ss "${{ github.event.inputs.waktu_mulai }}" \
                 -to "${{ github.event.inputs.waktu_selesai }}" \
                 -i "video_mentah.mp4" \
                 -c:v libx264 -crf 12 -preset slow \
                 -c:a aac -b:a 320k \
                 -avoid_negative_ts make_zero \
                 "hasil_potongan.mp4"

          echo "✅ Pemotongan selesai! Cek ukuran file hasil:"
          ls -lh hasil_potongan.mp4

      - name: 6. Upload Hasil Video ke Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: video-hasil-potongan
          path: hasil_potongan.mp4
          retention-days: 1
          
