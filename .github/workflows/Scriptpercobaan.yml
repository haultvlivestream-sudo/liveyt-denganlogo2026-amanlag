name: Live CCTV m3u8 Fix 2026 TES

on:
  workflow_dispatch:
    inputs:
      m3u8_url:
        description: '1. Link .m3u8 (Video)'
        required: true
      audio_url:
        description: '2. Link YouTube (Audio)'
        required: true
      kunci_rtmp:
        description: '3. Stream Key YouTube'
        required: true

jobs:
  streaming:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Tools (FFmpeg & yt-dlp Nightly)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 4. Jalankan Relay Streaming
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          set +e

          if [ -n "$YT_COOKIES" ] && [ "$YT_COOKIES" != "KOSONG" ]; then
            echo "$YT_COOKIES" > cookies.txt
            COOKIE_ARG="--cookies cookies.txt"
          else
            COOKIE_ARG=""
          fi
          
          LOGO_FILE="logoihyajuni2026.mp4"
          if [ ! -f "$LOGO_FILE" ]; then
            echo "ERROR: File $LOGO_FILE tidak ditemukan!"
            ls
            exit 1
          fi

          # 1. User-Agent Manusia untuk bypass blokir server CCTV & YouTube
          FIXED_UA="Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Mobile Safari/537.36"

          while true; do
            echo "--- [$(date)] Mencari Kualitas Audio YouTube via Sesi Android ---"
            
            AUDIO_URL=$(yt-dlp $COOKIE_ARG \
                                --js-runtime node \
                                --force-ipv4 \
                                --no-cache-dir \
                                --user-agent "$FIXED_UA" \
                                --extractor-args "youtube:player-client=android,web" \
                                -f "bestaudio/best" \
                                -g "${{ github.event.inputs.audio_url }}" 2>yt_error.log)

            if [ -z "$AUDIO_URL" ]; then
              echo "❌ GAGAL MENDAPATKAN URL AUDIO YOUTUBE!"
              echo "=== DETAIL ERROR DARI YT-DLP ==="
              cat yt_error.log
              echo "================================="
              echo "Menunggu 10 detik sebelum mencoba kembali..."
              sleep 10
              continue
            fi

            echo "🚀 SUMBER DITEMUKAN! Menghubungkan ke CCTV dan Audio..."

            # 2. Perbaikan FFmpeg: Menambahkan headers penyamaran & parameter anti-disconnect m3u8
            ffmpeg -headers "User-Agent: $FIXED_UA" \
              -live_start_index -1 \
              -reconnect 1 \
              -reconnect_at_eof 1 \
              -reconnect_streamed 1 \
              -reconnect_delay_max 5 \
              -fflags +genpts+discardcorrupt \
              -re -i "${{ github.event.inputs.m3u8_url }}" \
              -re -i "$AUDIO_URL" \
              -stream_loop -1 -i "$LOGO_FILE" \
              -filter_complex "[2:v]colorkey=0x006900:0.1:0.1,scale=iw*0.13:-1[logo]; [0:v][logo]overlay=W-w-(W*0.02):(W*0.02)" \
              -map 0:v \
              -map 1:a \
              -c:v libx264 -preset superfast -b:v 6000k -maxrate 8000k -bufsize 12000k \
              -pix_fmt yuv420p -g 60 -keyint_min 60 -sc_threshold 0 \
              -c:a aac -ar 44100 -b:a 128k \
              -f flv "rtmp://a.rtmp.youtube.com/live2/${{ github.event.inputs.kunci_rtmp }}"

            echo "⚠️ Koneksi CCTV terputus atau buffer habis. Mengulang dalam 10 detik..."
            sleep 10
          done
          
