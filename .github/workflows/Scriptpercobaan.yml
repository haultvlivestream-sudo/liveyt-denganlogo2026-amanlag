name: Live Streaming Auto-Resolution (1080p / 720p) IHYA' 7 TV

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link Video Sumber'
        required: true
      kunci_rtmp:
        description: 'Stream Key YouTube'
        required: true

jobs:
  streaming:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp -U

      - name: 4. Jalankan Relay Streaming Auto Detect
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          set +e

          if [ -n "$YT_COOKIES" ] && [ "$YT_COOKIES" != "KOSONG" ]; then
            echo "$YT_COOKIES" > cookies.txt
            COOKIE_ARG="--cookies cookies.txt"
          else
            COOKIE_ARG=""
          fi
          
          LOGO_FILE="logoihyajuni2026.mp4"
          INTRO_FILE="intrologoihya7tvjuli2026.mp4"

          if [ ! -f "$LOGO_FILE" ]; then
            echo "❌ ERROR: File $LOGO_FILE tidak ditemukan!"
            ls
            exit 1
          fi

          if [ ! -f "$INTRO_FILE" ]; then
            echo "❌ ERROR: File $INTRO_FILE tidak ditemukan!"
            ls
            exit 1
          fi

          # Hitung durasi intro (2x putar)
          INTRO_DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$INTRO_FILE")
          TOTAL_INTRO_DURATION=$(awk "BEGIN {print $INTRO_DURATION * 2}")
          FADE_START=$(awk "BEGIN {print $TOTAL_INTRO_DURATION - 3}")

          echo "------------------------------------------------"
          echo "Durasi Intro per loop: $INTRO_DURATION Detik"
          echo "Total Durasi Intro (2x): $TOTAL_INTRO_DURATION Detik"
          echo "Start Fade-out Intro: $FADE_START Detik"
          echo "------------------------------------------------"

          FIXED_UA="Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Mobile Safari/537.36"

          while true; do
            echo "--- [$(date)] Mengecek & Mengambil URL Stream ---"
            
            # Ambil Direct Video URL
            VIDEO_URL=$(yt-dlp $COOKIE_ARG \
                                --js-runtime node \
                                --force-ipv4 \
                                --no-cache-dir \
                                --user-agent "$FIXED_UA" \
                                --extractor-args "youtube:player-client=android,web" \
                                -f "bestvideo+bestaudio/best" \
                                -g "${{ github.event.inputs.link_youtube }}" 2>yt_error.log)

            if [ -z "$VIDEO_URL" ]; then
              echo "❌ GAGAL MENDAPATKAN URL VIDEO!"
              cat yt_error.log
              echo "Menunggu 15 detik sebelum coba lagi..."
              sleep 15
              continue
            fi

            # Deteksi tinggi resolusi video (HEIGHT)
            HEIGHT=$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of default=nw=1:nk=1 "$VIDEO_URL")
            
            # Fallback jika ffprobe gagal baca height
            if [ -z "$HEIGHT" ]; then
              HEIGHT=1080
            fi

            echo "🔍 Resolusi Asli Terdeteksi: ${HEIGHT}p"

            if [ "$HEIGHT" -ge 1080 ]; then
              echo "=========================================="
              echo "🎬 MENGGUNAKAN PROFILE: 1080p (Full HD)"
              echo "=========================================="
              
              ffmpeg -hide_banner -loglevel warning -re \
                -headers "User-Agent: $FIXED_UA" \
                -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 -reconnect_delay_max 10 \
                -rw_timeout 15000000 \
                -i "$VIDEO_URL" \
                -stream_loop -1 -i "$LOGO_FILE" \
                -stream_loop 1 -i "$INTRO_FILE" \
                -filter_complex "[1:v]colorkey=0x006900:0.1:0.1,scale=iw*0.13:-1[logo]; \
                                 [0:v][logo]overlay=W-w-(W*0.02):(W*0.02)[main_with_logo]; \
                                 [2:v]scale=1920:1080,format=pix_fmts=yuva420p,fade=t=out:st=$FADE_START:d=3:alpha=1[intro_faded]; \
                                 [main_with_logo][intro_faded]overlay=x='(W-w)/2':y='(H-h)/2':format=auto:enable='lte(t,$TOTAL_INTRO_DURATION)'" \
                -c:v libx264 -preset superfast -b:v 6000k -maxrate 8000k -bufsize 12000k \
                -pix_fmt yuv420p -g 60 -keyint_min 60 -sc_threshold 0 \
                -c:a aac -ar 44100 -b:a 128k \
                -f flv "rtmp://a.rtmp.youtube.com/live2/${{ github.event.inputs.kunci_rtmp }}"

            else
              echo "=========================================="
              echo "🎬 MENGGUNAKAN PROFILE: 720p (HD)"
              echo "=========================================="
              
              ffmpeg -hide_banner -loglevel warning -re \
                -headers "User-Agent: $FIXED_UA" \
                -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 -reconnect_delay_max 10 \
                -rw_timeout 15000000 \
                -i "$VIDEO_URL" \
                -stream_loop -1 -i "$LOGO_FILE" \
                -stream_loop 1 -i "$INTRO_FILE" \
                -filter_complex "[1:v]colorkey=0x006900:0.1:0.1,scale=iw*0.10:-1[logo]; \
                                 [0:v][logo]overlay=W-w-(W*0.02):(W*0.02)[main_with_logo]; \
                                 [2:v]scale=1280:720,format=pix_fmts=yuva420p,fade=t=out:st=$FADE_START:d=3:alpha=1[intro_faded]; \
                                 [main_with_logo][intro_faded]overlay=x='(W-w)/2':y='(H-h)/2':format=auto:enable='lte(t,$TOTAL_INTRO_DURATION)'" \
                -c:v libx264 -preset superfast -b:v 3000k -maxrate 4000k -bufsize 6000k \
                -pix_fmt yuv420p -g 60 -keyint_min 60 -sc_threshold 0 \
                -c:a aac -ar 44100 -b:a 128k \
                -f flv "rtmp://a.rtmp.youtube.com/live2/${{ github.event.inputs.kunci_rtmp }}"

            fi

            echo "⚠️ Stream terputus. Menunggu 10 detik sebelum me-restart..."
            sleep 10
          done
