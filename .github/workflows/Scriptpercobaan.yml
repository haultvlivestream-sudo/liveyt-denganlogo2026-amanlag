name: Potong Video YouTube (1080p Ultra HD)

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link YouTube (Video Sumber)'
        required: true
      mulai:
        description: 'Mulai (Jam:Menit:Detik)'
        default: '00:06:10'
      selesai:
        description: 'Selesai (Jam:Menit:Detik)'
        default: '00:06:40'

jobs:
  proses_editing:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Tools (High Efficiency)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl bc
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          
          # SOLUSI n-challenge: Hubungkan Node.js ke path global agar terdeteksi oleh yt-dlp
          sudo ln -s $(which node) /usr/local/bin/node || true

      - name: 4. Eksekusi Potong Video (1080p Best Quality)
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          # Simpan cookies jika ada
          if [ -n "$YT_COOKIES" ]; then
            echo "$YT_COOKIES" > cookies.txt
            COOKIE_ARG="--cookies cookies.txt"
          else
            COOKIE_ARG=""
          fi
          
          echo "--- [Mencari Direct Link 1080p dengan Identitas Manusia] ---"
          # No 1. Penguncian User-Agent Manusia (FIXED_UA)
          FIXED_UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          
          # No 2. Pembaruan Client ke android,web dengan Fallback Selector Format
          VIDEO_URL=$(yt-dlp $COOKIE_ARG \
                             --force-ipv4 \
                             --no-playlist \
                             --user-agent "$FIXED_UA" \
                             --extractor-args "youtube:client=android,web" \
                             -f "bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/bestvideo[height<=1080]+bestaudio/best[height<=1080]/best" \
                             -g "${{ github.event.inputs.link_youtube }}")

          if [ -z "$VIDEO_URL" ]; then
            echo "ERROR: Gagal mendapatkan URL Video. Cek ketersediaan video atau YT_COOKIES!"
            exit 1
          fi

          echo "--- [Memulai Pemotongan Video 1080p High-Bitrate] ---"
          # No 3. Pengaturan tanpa ':shortest=1' (Mencegah crash buffering)
          # No 4. Upgrade Preset CPU ke 'superfast'
          # No 5. Penurunan Batas Maksimal Bitrate & Buffer (8000k / 12000k)
          
          ffmpeg -ss ${{ github.event.inputs.mulai }} -to ${{ github.event.inputs.selesai }} -i "$VIDEO_URL" \
          -c:v libx264 -preset superfast -crf 17 \
          -maxrate 8000k -bufsize 12000k \
          -c:a aac -b:a 320k -movflags +faststart \
          hasil_1080p_jernih.mp4

      - name: 5. Upload Hasil Video
        uses: actions/upload-artifact@v4
        with:
          name: video-potong-1080p
          path: hasil_1080p_jernih.mp4
          
