name: Live CCTV m3u8 Fix Juli 2026 - Auto Schedule

on:
  workflow_dispatch:
  schedule:
    # 20:00 UTC setara dengan 03:00 WIB pagi
    - cron: '0 20 * * *'

jobs:
  streaming:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Tools (FFmpeg & yt-dlp Nightly)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg jq curl
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 4. Jalankan Relay Streaming
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          set +e

          # Konfigurasi langsung di dalam script
          INPUT_M3U8="https://dishub.pasuruankab.go.id:5444//LiveApp/streams/ALUNALUNBANGIL.m3u8"
          INPUT_AUDIO="https://www.youtube.com/live/OxNqWMGA41Q?si=MP3SFa_NSQ7XjWs4"
          KUNCI_RTMP="szju-ryy4-e3qe-fx1j-axmx"

          if [ -n "$YT_COOKIES" ] && [ "$YT_COOKIES" != "KOSONG" ]; then
            echo "$YT_COOKIES" > cookies.txt
            COOKIE_ARG="--cookies cookies.txt"
          else
            COOKIE_ARG=""
          fi
          
          LOGO_FILE="logoihyajuni2026.mp4"
          if [ ! -f "$LOGO_FILE" ]; then
            echo "ERROR: File $LOGO_FILE tidak ditemukan!"
            ls
            exit 1
          fi

          # User-Agent Manusia untuk bypass blokir
          FIXED_UA="Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Mobile Safari/537.36"

          while true; do
            echo "--- [$(date)] Mencari Kualitas Audio YouTube via Sesi Android ---"
            
            AUDIO_URL=$(yt-dlp $COOKIE_ARG \
                                --js-runtime node \
                                --force-ipv4 \
                                --no-cache-dir \
                                --user-agent "$FIXED_UA" \
                                --extractor-args "youtube:player-client=android,web" \
                                -f "bestaudio/best" \
                                -g "$INPUT_AUDIO" 2>yt_error.log)

            if [ -z "$AUDIO_URL" ]; then
              echo "❌ GAGAL MENDAPATKAN URL AUDIO YOUTUBE!"
              echo "=== DETAIL ERROR DARI YT-DLP ==="
              cat yt_error.log
              echo "================================="
              echo "Menunggu 10 detik sebelum mencoba kembali..."
              sleep 10
              continue
            fi

            echo "🚀 SUMBER DITEMUKAN! Menghubungkan ke CCTV Alun-Alun Bangil dan Audio..."
            
            ffmpeg -headers "User-Agent: $FIXED_UA" \
              -thread_queue_size 1024 \
              -live_start_index -1 \
              -reconnect 1 \
              -reconnect_at_eof 1 \
              -reconnect_streamed 1 \
              -reconnect_delay_max 30 \
              -fflags +genpts+discardcorrupt \
              -i "$INPUT_M3U8" \
              -thread_queue_size 1024 \
              -i "$AUDIO_URL" \
              -thread_queue_size 1024 \
              -stream_loop -1 -i "$LOGO_FILE" \
              -filter_complex "[0:v]scale=1280:720,setsar=1[main]; [2:v]colorkey=0x006900:0.1:0.1,scale=1280*0.115:-1[logo]; [main][logo]overlay=W-w-(W*0.025):(W*0.025)[v_out]" \
              -map "[v_out]" \
              -map 1:a \
              -c:v libx264 -preset ultrafast -tune zerolatency -b:v 4000k -maxrate 5000k -bufsize 8000k \
              -pix_fmt yuv420p -g 60 -keyint_min 60 -sc_threshold 0 \
              -c:a aac -ar 44100 -b:a 128k \
              -f flv "rtmp://a.rtmp.youtube.com/live2/$KUNCI_RTMP"

            echo "⚠️ Koneksi CCTV terputus atau buffer habis. Mengulang dalam 10 detik..."
            sleep 10
          done
          
